name: Build s0c
description: Set up Go, read the s0c version, and build the s0c binary for the given target.

inputs:
  goos:
    description: Target GOOS.
    required: false
    default: linux
  goarch:
    description: Target GOARCH.
    required: false
    default: amd64
  output-dir:
    description: Directory (relative to apps/s0c) to place the built binary.
    required: false
    default: dist
  checksum:
    description: If "true", also produce a .sha256 file alongside the binary.
    required: false
    default: "true"

outputs:
  version:
    description: s0c version read from internal/cli/version.txt.
    value: ${{ steps.version.outputs.version }}
  binary-name:
    description: Name of the built binary file.
    value: ${{ steps.build.outputs.name }}
  binary-path:
    description: Path to the built binary file (relative to the workspace).
    value: ${{ steps.build.outputs.path }}
  output-dir:
    description: Absolute output directory containing build artifacts.
    value: ${{ steps.build.outputs.dir }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: apps/s0c/go.mod
        cache-dependency-path: apps/s0c/go.sum

    - name: Read version
      id: version
      shell: bash
      run: |
        version=$(tr -d '[:space:]' < apps/s0c/internal/cli/version.txt)
        if [ -z "${version}" ]; then
          echo "apps/s0c/internal/cli/version.txt is empty" >&2
          exit 1
        fi
        echo "version=${version}" >> "$GITHUB_OUTPUT"

    - name: Build
      id: build
      shell: bash
      working-directory: apps/s0c
      env:
        CGO_ENABLED: "0"
        GOOS: ${{ inputs.goos }}
        GOARCH: ${{ inputs.goarch }}
        VERSION: ${{ steps.version.outputs.version }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        CHECKSUM: ${{ inputs.checksum }}
      run: |
        ext=""
        if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
        name="s0c-${VERSION}-${GOOS}-${GOARCH}${ext}"
        mkdir -p "${OUTPUT_DIR}"
        go build -trimpath -ldflags="-s -w" -o "${OUTPUT_DIR}/${name}" ./
        if [ "${CHECKSUM}" = "true" ]; then
          (cd "${OUTPUT_DIR}" && sha256sum "${name}" > "${name}.sha256")
        fi
        echo "name=${name}" >> "$GITHUB_OUTPUT"
        echo "path=apps/s0c/${OUTPUT_DIR}/${name}" >> "$GITHUB_OUTPUT"
        echo "dir=${GITHUB_WORKSPACE}/apps/s0c/${OUTPUT_DIR}" >> "$GITHUB_OUTPUT"

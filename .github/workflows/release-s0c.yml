name: Release s0c

on:
  push:
    branches: [main]
    paths:
      - "apps/s0c/**"
      - ".github/workflows/release-s0c.yml"
      - ".github/actions/go-build/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-s0c
  cancel-in-progress: false

jobs:
  check:
    name: Check version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      exists: ${{ steps.version.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read version and check tag
        id: version
        run: |
          version=$(tr -d '[:space:]' < apps/s0c/internal/cli/version.txt)
          if [ -z "${version}" ]; then
            echo "apps/s0c/internal/cli/version.txt is empty" >&2
            exit 1
          fi
          case "${version}" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "version '${version}' must match vMAJOR.MINOR.PATCH" >&2
              exit 1
              ;;
          esac
          tag="apps/s0c/${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build s0c
        id: s0c
        uses: ./.github/actions/go-build
        with:
          module-dir: apps/s0c
          version-file: internal/cli/version.txt
          binary-name: s0c
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: s0c-${{ matrix.goos }}-${{ matrix.goarch }}
          path: apps/s0c/dist/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish release
    needs: [check, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create tag
        env:
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.tag }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh release create "${TAG}" \
            --title "s0c ${VERSION}" \
            --notes "Automated release of s0c ${VERSION}." \
            --target "${GITHUB_SHA}" \
            dist/*
